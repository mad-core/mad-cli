name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Lint + typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'

      - name: ruff check + format
        run: |
          ruff check .
          ruff format --check .

      - name: mypy (strict on mad_cli.core)
        run: mypy

  test:
    name: Test + coverage
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'

      - name: Unit tests + coverage on mad_cli.core
        run: pytest -q tests/unit --cov=mad_cli.core --cov-report=term-missing --cov-fail-under=90

      - name: Full suite
        run: pytest -q

  audit:
    name: Dependency vulnerability audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'

      - name: pip-audit
        run: pip-audit --strict --skip-editable .

  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    needs: [quality, test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip build twine

      - name: Build sdist + wheel
        run: python -m build

      - name: Verify artifacts with twine
        run: python -m twine check dist/*
