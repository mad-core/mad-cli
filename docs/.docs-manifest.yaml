# docs/.docs-manifest.yaml — local source of truth for this repo's /docs.
# Structure mirrors the org backend docs contract, adapted to what mad-cli IS:
# an operator CLI (no HTTP/SSE/MCP surface, no database). The generic
# "interfaces" section becomes the CLI command surface (03-contracts/cli.md)
# plus its external dependencies; there is no api-reference / data-model /
# events entry because a CLI has none. triggers.paths / produces.params are
# adapted to this repo's actual tree.
#
# mad-cli-specific deviations from the generic backend contract:
#   - No 03-api/api-reference.md, no data-model, no events: mad-cli exposes a
#     Typer command surface, not an HTTP app object — nothing to dump as
#     OpenAPI and no persistence layer to model.
#   - 05-operations/ci-cd.md -> heuristic (not the `config`/deterministic path):
#     the shared docs-validate CI installs only `gen_docs`, so the job/step
#     skeleton is authored, not regenerated in CI.
#   - 06-history/changelog.md -> heuristic, sourced from the semantic-release
#     CHANGELOG.md at the repo root (consumer-facing, grouped by release), NOT a
#     raw git log.

schema_version: 1
service: mad-cli
domain: backend
generator_skill: generate-docs
bootstrap_commit: bc1bff6bca7cddd5b4ed12af8d9d51d8be32ab65
docs:
- path: docs/README.md
  section: meta
  kind: manual
  description: |
    The local docs manual. Explains the /docs structure and what each section
    contains. Hand-authored once; rarely changes.
  triggers:
    discovery_hint: |
      No code path determines this. Structural/meta content. Leave `paths: []`.
    paths: []
    max_age_days: 365
  produces:
    type: manual
  adapted_heuristic: null
  acknowledged_at_commit: bc1bff6bca7cddd5b4ed12af8d9d51d8be32ab65

